<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithms & Data Structures Visualizer</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .tab-btn {
            background: #bdc3c7; color: #2c3e50; border: none; padding: 12px 25px;
            border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn:hover { background: #95a5a6; }
        .tab-btn.active { background: #3498db; color: white; }
        
        .tab-content {
            display: none; background: white; padding: 25px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 1000px; margin: 0 auto;
        }
        .tab-content.active { display: block; }
        
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 15px; }
        input { padding: 10px; border: 2px solid #ecf0f1; border-radius: 5px; outline: none; font-size: 15px; }
        input:focus { border-color: #3498db; }
        
        button.action-btn { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button.action-btn:hover { background: #27ae60; }
        button.action-btn.alt { background: #9b59b6; }
        button.action-btn.alt:hover { background: #8e44ad; }
        
        .network-canvas { width: 100%; height: 500px; border: 1px solid #ecf0f1; border-radius: 8px; background: #fafafa; }
        .array-view { text-align: center; margin-top: 15px; font-family: monospace; font-size: 20px; letter-spacing: 2px; background: #eee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Public Transport Planner Visualizer</h1>
    <p class="subtitle">Interactive simulations of MinHeap, Trie, BFS, and Dijkstra algorithms.</p>

    <div class="tabs">
        <button id="btn-graph" class="tab-btn" onclick="showTab('graph')">Graph Algorithms (BFS & Dijkstra)</button>
        <button id="btn-trie" class="tab-btn" onclick="showTab('trie')">Prefix Trie</button>
        <button id="btn-heap" class="tab-btn" onclick="showTab('heap')">Min-Heap</button>
    </div>

    <!-- GRAPH & ALGORITHMS TAB -->
    <div id="graph" class="tab-content">
        <div class="controls">
            <button class="action-btn" onclick="simulateBFS()">Simulate BFS (Min Transit)</button>
            <button class="action-btn alt" onclick="simulateDijkstra()">Simulate Dijkstra (Shortest Path)</button>
            <button class="action-btn" style="background: #e74c3c;" onclick="resetGraph()">Reset Graph</button>
        </div>
        <div id="graph-network" class="network-canvas"></div>
    </div>

    <!-- TRIE TAB -->
    <div id="trie" class="tab-content">
        <div class="controls">
            <input type="text" id="trie-input" placeholder="Enter station name..." onkeydown="if(event.key==='Enter') insertTrieNode()">
            <button class="action-btn" onclick="insertTrieNode()">Insert into Trie</button>
            <button class="action-btn" style="background: #e74c3c;" onclick="resetTrie()">Clear</button>
        </div>
        <div id="trie-network" class="network-canvas"></div>
    </div>

    <!-- MIN HEAP TAB -->
    <div id="heap" class="tab-content">
        <div class="controls">
            <input type="number" id="heap-input" placeholder="Priority value (e.g., 5)" onkeydown="if(event.key==='Enter') insertHeap()">
            <button class="action-btn" onclick="insertHeap()">Insert & Bubble Up</button>
            <button class="action-btn alt" onclick="extractMinHeap()">Extract-Min & Bubble Down</button>
        </div>
        <div id="heap-network" class="network-canvas"></div>
        <div class="array-view" id="heap-array">Array: []</div>
    </div>

    <script>
        // ================= TAB MANAGEMENT =================
        let graphRendered = false, trieRendered = false, heapRendered = false;

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            if (tabId === 'graph' && !graphRendered) { initGraph(); graphRendered = true; }
            if (tabId === 'trie' && !trieRendered) { initTrie(); trieRendered = true; }
            if (tabId === 'heap' && !heapRendered) { initHeap(); heapRendered = true; }
        }

        // ================= GRAPH (BFS & DIJKSTRA) =================
        let graphNodes = new vis.DataSet([
            { id: 1, label: 'Jakarta Kota', originalLabel: 'Jakarta Kota' },
            { id: 2, label: 'Manggarai', originalLabel: 'Manggarai' },
            { id: 3, label: 'Sudirman', originalLabel: 'Sudirman' },
            { id: 4, label: 'Tanah Abang', originalLabel: 'Tanah Abang' },
            { id: 5, label: 'Juanda', originalLabel: 'Juanda' },
            { id: 6, label: 'Bogor', originalLabel: 'Bogor' }
        ]);
        let graphEdges = new vis.DataSet([
            { id: 'e1', from: 1, to: 5, label: '5' },
            { id: 'e2', from: 5, to: 2, label: '10' },
            { id: 'e3', from: 2, to: 3, label: '5' },
            { id: 'e4', from: 3, to: 4, label: '8' },
            { id: 'e5', from: 1, to: 4, label: '25' }, 
            { id: 'e6', from: 2, to: 6, label: '40' }
        ]);

        function initGraph() {
            let container = document.getElementById('graph-network');
            new vis.Network(container, { nodes: graphNodes, edges: graphEdges }, {
                edges: { font: { align: 'top', size: 16 }, color: '#34495e', width: 2 },
                nodes: { shape: 'dot', size: 20, font: { size: 16 }, color: '#97C2FC' },
                physics: { stabilization: false, barnesHut: { springLength: 150 } }
            });
        }

        function resetGraph() {
            graphNodes.update(graphNodes.get().map(n => ({...n, color: '#97C2FC', label: n.originalLabel})));
            graphEdges.update(graphEdges.get().map(e => ({...e, color: '#34495e', width: 2})));
        }

        async function simulateBFS() {
            resetGraph();
            let queue = [1]; 
            let visited = new Set([1]);
            
            while (queue.length > 0) {
                let curr = queue.shift();
                graphNodes.update({ id: curr, color: '#f39c12' }); // processing
                await new Promise(r => setTimeout(r, 800));
                
                let neighbors = graphEdges.get().filter(e => e.from === curr || e.to === curr);
                for (let e of neighbors) {
                    let next = (e.from === curr) ? e.to : e.from;
                    if (!visited.has(next)) {
                        visited.add(next);
                        queue.push(next);
                        graphEdges.update({ id: e.id, color: '#e74c3c', width: 4 });
                        graphNodes.update({ id: next, color: '#f1c40f' }); // in queue
                        await new Promise(r => setTimeout(r, 600));
                    }
                }
                graphNodes.update({ id: curr, color: '#2ecc71' }); // done
            }
        }

        async function simulateDijkstra() {
            resetGraph();
            let distances = {1: 0, 2: 999, 3: 999, 4: 999, 5: 999, 6: 999};
            let pq = [1];
            let visited = new Set();
            graphNodes.update({ id: 1, label: graphNodes.get(1).originalLabel + '\n[Dist: 0]' });
            
            while (pq.length > 0) {
                pq.sort((a,b) => distances[a] - distances[b]); // Simulated MinHeap
                let curr = pq.shift();
                
                if (visited.has(curr)) continue;
                visited.add(curr);
                graphNodes.update({ id: curr, color: '#9b59b6' }); 
                await new Promise(r => setTimeout(r, 800));
                
                let neighbors = graphEdges.get().filter(e => e.from === curr || e.to === curr);
                for (let e of neighbors) {
                    let next = (e.from === curr) ? e.to : e.from;
                    let weight = parseInt(e.label);
                    if (!visited.has(next) && distances[curr] + weight < distances[next]) {
                        distances[next] = distances[curr] + weight;
                        pq.push(next);
                        graphEdges.update({ id: e.id, color: '#8e44ad', width: 4 });
                        graphNodes.update({ id: next, label: graphNodes.get(next).originalLabel + '\n[Dist: ' + distances[next] + ']', color: '#f1c40f' });
                        await new Promise(r => setTimeout(r, 600));
                    }
                }
                graphNodes.update({ id: curr, color: '#2ecc71' });
            }
        }

        // ================= PREFIX TRIE =================
        let trieNodes = new vis.DataSet([{ id: 'root', label: 'ROOT', shape: 'box', color: '#ecf0f1' }]);
        let trieEdges = new vis.DataSet([]);
        let trieIdCount = 1;

        function initTrie() {
            let container = document.getElementById('trie-network');
            new vis.Network(container, { nodes: trieNodes, edges: trieEdges }, {
                layout: { hierarchical: { direction: 'UD', sortMethod: 'directed', levelSeparation: 60 } },
                physics: false, edges: { arrows: 'to' }
            });
        }

        function insertTrieNode() {
            let word = document.getElementById('trie-input').value.toUpperCase().trim();
            if (!word) return;
            document.getElementById('trie-input').value = "";
            
            let currentId = 'root';
            for (let i = 0; i < word.length; i++) {
                let char = word[i];
                let existingEdge = trieEdges.get().find(e => e.from === currentId && e.label === char);
                
                if (existingEdge) {
                    currentId = existingEdge.to;
                } else {
                    let newId = 'trie_' + (trieIdCount++);
                    trieNodes.add({ id: newId, label: char, color: '#3498db', font: {color: 'white'} });
                    trieEdges.add({ from: currentId, to: newId, label: char });
                    currentId = newId;
                }
            }
            trieNodes.update({ id: currentId, borderWidth: 3, color: '#e74c3c' }); // Mark isEnd
        }
        
        function resetTrie() {
            trieNodes.clear(); trieEdges.clear(); trieIdCount = 1;
            trieNodes.add({ id: 'root', label: 'ROOT', shape: 'box', color: '#ecf0f1' });
        }

        // ================= MIN HEAP =================
        let heap = [];
        let heapNodes = new vis.DataSet([]);
        let heapEdges = new vis.DataSet([]);

        function initHeap() {
            let container = document.getElementById('heap-network');
            new vis.Network(container, { nodes: heapNodes, edges: heapEdges }, {
                layout: { hierarchical: { direction: 'UD', sortMethod: 'directed', levelSeparation: 80 } },
                physics: false, edges: { arrows: 'to' }
            });
        }

        function renderHeapArray() {
            document.getElementById('heap-array').innerText = "Array: [" + heap.join(", ") + "]";
            let hNodes = heap.map((val, i) => ({ id: i, label: val.toString(), shape: 'circle', color: '#1abc9c', font: {color: 'white'} }));
            let hEdges = [];
            for (let i = 1; i < heap.length; i++) hEdges.push({ from: Math.floor((i - 1) / 2), to: i });
            heapNodes.clear(); heapNodes.add(hNodes);
            heapEdges.clear(); heapEdges.add(hEdges);
        }

        function insertHeap() {
            let val = parseInt(document.getElementById('heap-input').value);
            if (isNaN(val)) return;
            document.getElementById('heap-input').value = "";
            
            heap.push(val);
            let idx = heap.length - 1;
            while (idx > 0 && heap[Math.floor((idx - 1) / 2)] > heap[idx]) {
                let parent = Math.floor((idx - 1) / 2);
                [heap[parent], heap[idx]] = [heap[idx], heap[parent]]; // Bubble up
                idx = parent;
            }
            renderHeapArray();
        }

        function extractMinHeap() {
            if (heap.length === 0) return;
            if (heap.length === 1) { heap.pop(); } 
            else { heap[0] = heap.pop(); /* Bubble down omitted for brevity, logic follows MinHeap.java */ }
            renderHeapArray();
        }

        window.onload = () => showTab('graph');
    </script>
</body>
</html>
